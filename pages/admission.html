<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভর্তি | Madrasatul Quran Online</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../images/favicon.png">
</head>
<body>

    <header class="main-header">
        <div class="logo-section">
            <img src="../images/logo.png" alt="Logo">
            <div class="logo-text">
                <h1>Madrasatul Quran Online</h1>
                <p>আমরা গাই কুরআনের আলোয়</p>
            </div>
        </div>
        <nav class="desktop-nav">
            <ul>
                <li><a href="../index.html">হোম</a></li>
                <li><a href="about.html">আমাদের সম্পর্কে</a></li>
                <li><a href="courses.html">কোর্স</a></li>
                <li><a href="admission.html">ভর্তি</a></li>
                <li><a href="contact.html">যোগাযোগ</a></li>
            </ul>
        </nav>
        <a href="admission.html" class="header-btn">ভর্তি করুন</a>
    </header>

    <section class="admission-intro">
        <h2>অনলাইন ভর্তি আবেদন</h2>
        <p>আপনার সন্তানের তথ্য দিয়ে নিচের ফর্মটি পূরণ করুন। আমরা দ্রুত যোগাযোগ করবো।</p>
    </section>

    <section class="admission-box">
        <h2>আবেদন ফর্ম</h2>
        <form action="https://script.google.com/macros/s/AKfycbwniRMQjDOOa6nTYBOFeqZ5GcGyEQhQ7OOUIugkbQctv1RtN7S89fbnjOaOHcR-WqPRwA/exec" method="POST">
            <input type="text" name="name" placeholder="শিক্ষার্থীর নাম" required>
            <input type="number" name="age" placeholder="শিক্ষার্থীর বয়স" required>
            <input type="text" name="guardian" placeholder="অভিভাবকের নাম" required>
            <input type="tel" name="phone" placeholder="Whatsapp: +880 1xxxxxxxxx" required>
            <input type="text" name="country" placeholder="দেশের নাম / ঠিকানা লিখুন" required>
            
            <select name="course" required>
                <option value="" disabled selected>কোর্স নির্বাচন করুন</option>
                <option>নূরানী কায়দা</option>
                <option>তাজবিদ</option>
                <option>কুরআন শিক্ষা</option>
                <option>নাজেরা</option>
                <option>হিফজুল কুরআন</option>
            </select>
            
            <button type="submit" id="submitBtn">আবেদন করুন</button>
        </form>

        <script>
            function resetFormState(){
                const form = document.querySelector("form");
                const btn = document.getElementById("submitBtn");
                if(form) form.reset();
                if(btn){
                    btn.innerHTML = "আবেদন করুন";
                    btn.disabled = false;
                }
            }
            window.onload = resetFormState;
            window.onpageshow = function(event){
                if(event.persisted) resetFormState();
            };
            const form = document.querySelector("form");
            if(form){
                form.addEventListener("submit", function(){
                    const btn = document.getElementById("submitBtn");
                    btn.innerHTML = "⏳ আবেদন পাঠানো হচ্ছে...";
                    btn.disabled = true;
                });
            }
        </script>
    </section>

    <footer>
        <p>© Madrasatul Quran Online - MadrasaQO 2026</p>
    </footer>
    <a class="floating-whatsapp" href="https://wa.me/8801707532306" target="_blank">☏</a>

</body>
</html>
